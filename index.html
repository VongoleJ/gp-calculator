<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3f5f68">
  <title>GP Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">GP</div>
        <div>
          <h1>GP Calculator</h1>
          <p>คำนวณราคาขาย กำไร และ GP</p>
        </div>
      </div>
    </header>

    <section class="calculator" aria-label="เครื่องคำนวณ GP">
      <section class="panel input-panel" aria-labelledby="inputTitle">
        <div class="panel-title">
          <h2 id="inputTitle">ข้อมูลตั้งต้น</h2>
        </div>

        <div class="fields">
          <label class="field" for="basePrice">
            <span>ราคาขาย</span>
            <span class="input-box">
              <input id="basePrice" class="money-input" type="text" inputmode="numeric" autocomplete="off" value="275,900">
              <span>บาท</span>
            </span>
          </label>

          <label class="field" for="cost">
            <span>ต้นทุน</span>
            <span class="input-box">
              <input id="cost" class="money-input" type="text" inputmode="numeric" autocomplete="off" value="220,000">
              <span>บาท</span>
            </span>
          </label>
        </div>

        <div class="initial-results" aria-label="ผลลัพธ์จากข้อมูลตั้งต้น">
          <div class="metric large">
            <span>กำไรเริ่มต้น</span>
            <strong id="initialProfit">55,900</strong>
          </div>
          <div class="metric large">
            <span>GP เริ่มต้น</span>
            <strong id="initialGp">20.26%</strong>
          </div>
        </div>
      </section>

      <section class="panel control-panel" aria-labelledby="priceTitle">
        <div class="panel-title compact">
          <div>
            <h2 id="priceTitle">ปรับราคาขาย</h2>
            <p>ช่วงราคาอิงจาก GP 0-40%</p>
          </div>
          <output id="priceGpBadge" class="badge">20.26%</output>
        </div>

        <div class="slider-card">
          <div class="slider-top">
            <label for="priceSlider">ราคาขาย</label>
            <output id="priceSliderText">275,900 บาท</output>
          </div>
          <input id="priceSlider" type="range" min="220000" max="366700" step="100" value="275900">
          <div class="range-caption">
            <span id="priceMinText">0% GP</span>
            <span id="priceMaxText">40% GP</span>
          </div>
        </div>

        <div class="result-grid">
          <div class="metric">
            <span>กำไร</span>
            <strong id="priceModeProfit">55,900</strong>
          </div>
          <div class="metric">
            <span>GP</span>
            <strong id="priceModeGp">20.26%</strong>
          </div>
        </div>
      </section>

      <section class="panel control-panel accent-panel" aria-labelledby="targetTitle">
        <div class="panel-title compact">
          <div>
            <h2 id="targetTitle">ตั้งเป้า GP</h2>
            <p>ย้อนหาราคาขายจาก GP เป้าหมาย</p>
          </div>
          <output id="targetGpText" class="badge">20%</output>
        </div>

        <label class="field slim" for="targetGpInput">
          <span>Target GP</span>
          <span class="input-box">
            <input id="targetGpInput" type="text" inputmode="decimal" autocomplete="off" value="20">
            <span>%</span>
          </span>
        </label>

        <div class="slider-card">
          <div class="slider-top">
            <label for="targetGpSlider">GP เป้าหมาย</label>
            <output id="targetGpValue">20%</output>
          </div>
          <input id="targetGpSlider" type="range" min="0" max="40" step="0.5" value="20">
          <div class="range-caption">
            <span>0%</span>
            <span>40%</span>
          </div>
        </div>

        <div class="result-grid">
          <div class="metric primary">
            <span>ราคาขายที่ต้องใช้</span>
            <strong id="targetPrice">275,000</strong>
          </div>
          <div class="metric">
            <span>กำไร</span>
            <strong id="targetProfit">55,000</strong>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
